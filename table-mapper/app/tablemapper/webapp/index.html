<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classic Table Mapper</title>
    <script>
        window["sap-ushell-config"] = {
            defaultRenderer: "fiori2",
            renderers: {
                fiori2: {
                    componentData: {
                        config: {
                            enableNotificationsUI: false,
                            enableNotifications: false,
                            enableSearch: false,
                            enablePersonalization: false,
                            enableSetTheme: true,
                            enableSetLanguage: true
                        }
                    }
                }
            },
            applications: {
                "tablemapper-app": {
                    title: "Classic Table Mapper",
                    description: "Find successor CDS Views for SAP database tables",
                    additionalInformation: "SAPUI5.Component=tablemapper",
                    applicationType: "URL",
                    url: "/tablemapper/webapp",
                    navigationMode: "embedded"
                }
            }
        }
    </script>
    <script id="sap-ushell-bootstrap" src="https://sapui5.hana.ondemand.com/1.145.0/test-resources/sap/ushell/bootstrap/sandbox.js"></script>
    <script id="sap-ui-bootstrap" src="https://sapui5.hana.ondemand.com/1.145.0/resources/sap-ui-core.js"
        data-sap-ui-flexibilityServices='[{"connector": "LocalStorageConnector"}]'
        data-sap-ui-libs="sap.ui.core, sap.ui.generic.app, sap.ushell, sap.fe.templates"
        data-sap-ui-oninit="module:sap/ui/core/ComponentSupport"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-async="true"
        data-sap-ui-frameOptions="allow"
        data-sap-ui-preload="async"
        data-sap-ui-resourceroots='{"tablemapper": "/tablemapper/webapp"}'
    ></script>
    <script>
        function setTheme(dark) { sap.ui.getCore().applyTheme(dark ? "sap_horizon_dark" : "sap_horizon"); }
        const colorMatcher = window.matchMedia('(prefers-color-scheme: dark)');
        setTheme(colorMatcher.matches);
        colorMatcher.addEventListener("change", e => setTheme(e.matches));

        sap.ui.getCore().attachInit(function() {
            sap.ushell.Container.createRenderer().placeAt("content");
        });
    </script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content"></body>
</html>
